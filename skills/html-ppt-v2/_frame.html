<!DOCTYPE html>
<html lang="zh-CN"
      data-theme="{{THEME}}"
      data-themes="tokyo-night,pitch-deck-vc,corporate-clean,minimal-white,aurora,dracula,nord,catppuccin-mocha,glassmorphism,neo-brutalism"
      data-theme-base="../../skills/html-ppt-v2/themes/">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="../../skills/html-ppt-v2/fonts.css">
<link rel="stylesheet" href="../../skills/html-ppt-v2/base.css">
<link rel="stylesheet" id="theme-link" href="../../skills/html-ppt-v2/themes/{{THEME}}.css">
<link rel="stylesheet" href="../../skills/html-ppt-v2/animations/animations.css">

<!-- ── LAYOUT FILL (防止内容溢出 / 空白 / 重叠) ─────────────────────── -->
<style>
/* 第一个内容块自动撑满 header 之后的剩余高度 */
.slide>header+div,.slide>header+ul{flex:1;min-height:0}
/* stretched grid 中 col 内的 card 等分填充高度 */
.stretch>.col{display:flex;flex-direction:column}
.stretch>.col>.card{flex:1;min-height:0}
/* card 内容裁剪而非溢出 */
.card,.card-accent,.card-soft,.card-outline{overflow:hidden}
/* nlist 作为主内容时均匀分布 */
.slide>header+ul.nlist{justify-content:space-evenly}
/* stretch 工具类 */
.stretch{align-items:stretch!important}
/* col 纵向堆叠容器 */
.col{display:flex;flex-direction:column;gap:14px}
/* split 布局 */
.split{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.split-32{grid-template-columns:3fr 2fr}
.split-23{grid-template-columns:2fr 3fr}
.split-13{grid-template-columns:1fr 3fr}
</style>
</head>
<body>

<div class="deck" id="deck">
<!-- SLIDES HERE -->
</div>

<script src="../../skills/html-ppt-v2/runtime.js"></script>
</body>
</html>
